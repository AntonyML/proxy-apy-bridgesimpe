name = "proxy-apy-bridgesimpe"
main = "src/worker.js"
compatibility_date = "2026-05-20"

routes = [
  { pattern = "api.tonyml.com/api/*", zone_name = "tonyml.com" },
  { pattern = "api.tonyml.com",       zone_name = "tonyml.com", custom_domain = true }
]

[build]
command = "npm install"

[observability]
enabled = true
[observability.logs]
enabled = true

[vars]
ENVIRONMENT = "production"
LOG_LEVEL    = "info"

# Secrets (set via CLI — not stored here):
#   wrangler secret put API_KEY
